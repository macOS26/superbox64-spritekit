<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hello · SuperBox64 SpriteKit</title>
<style>
  html, body { margin: 0; background: #111; height: 100%; }
  body { display: flex; align-items: center; justify-content: center; }
  canvas { width: min(100vw, calc(100vh * 1184 / 666)); height: auto; image-rendering: pixelated; background: #000; }
</style>
</head>
<body>
  <canvas id="game" width="1184" height="666"></canvas>
  <script>
    window.WASMWEB = {
      wasmUrl:   'hello.wasm',
      assetRoot: 'assets',
      canvas:    document.getElementById('game'),
      logicalWidth:  1184,
      logicalHeight: 666,
    };
  </script>
  <!-- bundle.js: inlined data: URLs + fetch shim for file:/// playability. -->
  <script src="bundle.js"></script>
  <script src="runtime.js"></script>
</body>
</html>
